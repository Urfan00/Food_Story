{% extends 'base.html' %}

{% block content %}

    <section class="ftco-section contact-section register">
        <div class="container">
            <div class="row block-9 justify-content-center">
                <div class="col-md-6 order-md-last d-flex">
                    <form method='POST' action="#" class="bg-light p-5 contact-form">

                        {% csrf_token %}

                        {% if form.errors %}
                            <div class="alert alert-danger alert-dismissible" role="alert">
                                <div id="form_errors">
                                    {% for key, value in form.errors.items %}
                                        <strong>{{ value }}</strong>
                                    {% endfor %}
                                </div>
                                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>
                        {% endif %}

                        <a class="navbar-brand center" href="#">Activate Code<span>.</span></a>
                        
                        <div class="form-group">
                            <label>Kodu daxil edin</label>
                            <input type="text" class="form-control" name="code" maxlength='6' id='code'>
                        </div>

                        <div class="form-group">
                            <input type="submit" class="btn btn-primary py-3 px-5">
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </section>

{% endblock %}
